<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trypophobia</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #07060a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Courier New", monospace;
    color: #cdbfae;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  canvas {
    background: #0a0807;
    border: 2px solid #2a211a;
    border-radius: 8px;
    box-shadow: 0 0 60px rgba(120, 40, 30, 0.25) inset, 0 0 30px rgba(0,0,0,0.8);
    touch-action: none;
    cursor: pointer;
  }
  #hint {
    margin-top: 12px;
    font-size: 13px;
    color: #6e6256;
    text-align: center;
    line-height: 1.7;
    max-width: 620px;
  }
  #hint b { color: #b59a7a; }
</style>
</head>
<body>
  <canvas id="game" width="620" height="660"></canvas>
  <div id="hint">
    <b>Click</b> a hole to plug it &nbsp;•&nbsp; connect <b>5</b> in a row to win &nbsp;•&nbsp; <b>Space</b> / <b>R</b> restart<br>
    🎧 <span style="color:#8a4a4a">headphones on — sound begins when you click. you have been warned.</span><br>
    <b>1</b> Easy &nbsp;<b>2</b> Medium &nbsp;<b>3</b> Hard CPU &nbsp;•&nbsp; <b>P</b> 2-player hot-seat &nbsp;•&nbsp; <b>I</b> Infested mode &nbsp;•&nbsp; <b>M</b> mute
  </div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;

// ---------------------------------------------------------------------------
// TRYPOPHOBIA — a tabletop "connect 4-in-a-row" duel played on a honeycomb
// cluster of holes. Players take turns plugging holes; first to line up four
// of their own along any of the three hex axes wins. The dense field of holes
// is, of course, the whole point. Optional "Infested" mode lets empty holes
// fester permanently shut over time, tightening the cluster as you play.
// ---------------------------------------------------------------------------

// --- Board geometry (hexagon of hexes, axial coordinates) ------------------
const R = 4;                 // board radius -> 61 holes
const HEX = 33;              // hex spacing (px)
const HOLE_R = 24;           // visible hole radius (px)
const NEED = 5;              // holes in a row required to win (5, not 4: an open
                            // 4-in-a-row board is a forced first-player win — you
                            // could just draw a straight line. 5 is defensible.)
const ORIGIN_X = W / 2;
const ORIGIN_Y = H / 2 + 14;

// Player identities. 0 = empty, 1 = player/green, 2 = rival/red, 3 = festered.
const SPORE = 1, MITE = 2, FESTER = 3;
const COLORS = {
  [SPORE]: { core: "#9fe05a", rim: "#5e8a2e", glow: "rgba(159,224,90,0.55)", name: "SPORE" },
  [MITE]:  { core: "#ff5d7c", rim: "#9c2f44", glow: "rgba(255,93,124,0.55)", name: "MITE"  },
};

// Build the hole list with axial coords + precomputed pixel centers.
const holes = [];            // { q, r, x, y, owner, pop, hover }
const holeAt = {};           // "q,r" -> hole
function key(q, r) { return q + "," + r; }
for (let q = -R; q <= R; q++) {
  for (let r = -R; r <= R; r++) {
    if (Math.abs(q + r) > R) continue;          // outside the hexagon
    const x = ORIGIN_X + HEX * Math.sqrt(3) * (q + r / 2);
    const y = ORIGIN_Y + HEX * 1.5 * r;
    const hole = { q, r, x, y, owner: 0, pop: 0, hover: 0 };
    holes.push(hole);
    holeAt[key(q, r)] = hole;
  }
}

// The three axes a winning line can run along (and their reverse is implicit).
const DIRS = [ [1, 0], [0, 1], [1, -1] ];
// All six hex neighbours, used to find candidate moves near the action.
const NEIGHBORS = [ [1, 0], [-1, 0], [0, 1], [0, -1], [1, -1], [-1, 1] ];

// Every straight run of NEED holes (a "window") that could become a winning
// line — precomputed once and reused by the AI's board evaluation.
const WINDOWS = [];
for (const h of holes) {
  for (const [dq, dr] of DIRS) {
    const w = [h];
    let q = h.q + dq, r = h.r + dr, ok = true;
    for (let i = 1; i < NEED; i++) {
      const n = holeAt[key(q, r)];
      if (!n) { ok = false; break; }
      w.push(n); q += dq; r += dr;
    }
    if (ok) WINDOWS.push(w);
  }
}
// Value of having N of your own holes in an otherwise-empty window.
const WEIGHT = [0, 1, 12, 60, 1000];

// --- Game state ------------------------------------------------------------
let turn = SPORE;            // whose move it is
let vsCpu = true;            // CPU plays MITE unless this is false (hot-seat)
let difficulty = 2;         // 1 easy / 2 medium / 3 hard
let infested = false;       // "Infested" mode: empty holes fester shut
let movesSincePlace = 0;    // counter used to time festering
let gameOver = false;
let winner = 0;             // SPORE / MITE / 0=ongoing / -1=stalemate
let winLine = [];           // holes forming the winning line (for the flourish)
let cpuThinkAt = 0;         // frame the CPU commits its move
let muted = false;
let frame = 0;

// --- Juice -----------------------------------------------------------------
let particles = [];
let shake = 0;
let crawlers = [];          // ambient little bugs skittering over the board
let banner = null;          // { text, color, t }

// --- Audio -----------------------------------------------------------------
// Two layers: short interaction blips (sfx), and a fully generative horror
// score (drone + heartbeat + screech stingers + breathing whispers) built live
// in WebAudio so the file stays self-contained. Both honour `muted`.
let actx = null;
let heartPulse = 0;          // spikes on every heartbeat; drives the red vignette
const music = { started: false, master: null, vol: 0.6, tense: false, noise: null };

// Loss "jumpscare" state machine. On a loss the whole score cuts to silence and
// the screen fades to black; after an unpredictable wait something lunges out.
// state: "off" | "quiet" (dread build) | "active" (the scare is on screen).
const jump = { state: "off", t: 0, wait: 0 };
function scoreSilent() { return muted || jump.state !== "off"; }

function ensureCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === "suspended") actx.resume();
  return actx;
}

function sfx(freq, dur, type = "sine", vol = 0.2) {
  if (muted) return;
  try {
    ensureCtx();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + dur);
  } catch (e) {}
}
function plopSound()  { sfx(150 + Math.random() * 40, 0.2, "sine", 0.28); sfx(70, 0.16, "triangle", 0.18); }
function festerSound() { sfx(60, 0.5, "sawtooth", 0.2); if (actx) screech(actx.currentTime, 0.12); }
function winSound() {
  // an uneasy "victory" — a minor-key arpeggio that doesn't quite resolve
  [392, 466, 587, 740].forEach((f, i) => setTimeout(() => sfx(f, 0.3, "triangle", 0.2), i * 120));
}

// --- Generative horror score -----------------------------------------------
function makeNoiseBuffer() {
  const len = actx.sampleRate * 2;
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}

function startMusic() {
  if (music.started) return;
  ensureCtx();
  music.started = true;
  music.noise = makeNoiseBuffer();

  const master = actx.createGain();
  master.gain.setValueAtTime(0.0001, actx.currentTime);
  master.gain.linearRampToValueAtTime(muted ? 0.0001 : music.vol, actx.currentTime + 4);
  master.connect(actx.destination);
  music.master = master;

  buildDrone();
  buildRumble();
  scheduleHeartbeat();
  scheduleStinger();
  scheduleWhisper();
  scheduleBells();
  scheduleGroan();
}

// Low dissonant cluster (root + minor 2nd + tritone + fifth) — deeply unsettled.
function buildDrone() {
  const filt = actx.createBiquadFilter();
  filt.type = "lowpass"; filt.frequency.value = 360; filt.Q.value = 3;
  filt.connect(music.master);
  // slow filter drift so the drone seems to breathe and creep
  const fLfo = actx.createOscillator(); fLfo.frequency.value = 0.03;
  const fLfoG = actx.createGain(); fLfoG.gain.value = 180;
  fLfo.connect(fLfoG); fLfoG.connect(filt.frequency); fLfo.start();

  // 27.5 = sub A0 (a black, body-felt floor) up through a minor-2nd/tritone cluster.
  [27.5, 55.0, 58.27, 77.78, 82.41].forEach((f, i) => {
    const o = actx.createOscillator();
    o.type = i === 0 ? "sine" : (i % 2 ? "sawtooth" : "triangle"); // saw = harsher, grittier
    o.frequency.value = f;
    o.detune.value = (i - 2) * 7;                    // micro-detune = beating, queasy
    const g = actx.createGain(); g.gain.value = i === 0 ? 0.16 : 0.09;
    const lfo = actx.createOscillator(); lfo.frequency.value = 0.04 + i * 0.013;
    const lfoG = actx.createGain(); lfoG.gain.value = 0.05;
    lfo.connect(lfoG); lfoG.connect(g.gain); lfo.start();
    o.connect(g); g.connect(filt); o.start();
  });

  // A faint, ever-present high "tinnitus" ring — the sound of held breath.
  const ring = actx.createOscillator(); ring.type = "sine"; ring.frequency.value = 5200;
  const rg = actx.createGain(); rg.gain.value = 0.006;
  ring.connect(rg); rg.connect(music.master); ring.start();
}

// A broken music-box: sparse, detuned bell notes from a creepy scale, with long
// decay. Nothing is more unsettling than a lullaby that's slightly wrong.
const BELL_SCALE = [415.30, 440.00, 466.16, 554.37, 622.25, 739.99]; // Ab-ish dissonant set
function bell(t, f) {
  for (const mul of [1, 2.01, 2.99]) {               // inharmonic partials = "wrong" bell
    const o = actx.createOscillator(); o.type = "triangle";
    o.frequency.value = f * mul; o.detune.value = (Math.random() - 0.5) * 25;
    const g = actx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.09 / mul, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 2.6 + Math.random());
    o.connect(g); g.connect(music.master);
    o.start(t); o.stop(t + 4);
  }
}
function scheduleBells() {
  if (!music.started) return;
  if (!scoreSilent() && Math.random() < 0.8) {
    const n = 1 + (Math.random() < 0.3 ? 1 : 0);     // usually one note, sometimes two
    for (let i = 0; i < n; i++) {
      bell(actx.currentTime + 0.05 + i * 0.28, BELL_SCALE[Math.floor(Math.random() * BELL_SCALE.length)]);
    }
  }
  setTimeout(scheduleBells, (4 + Math.random() * 7) * 1000);
}

// A low, wet groan that swells from the dark — like something large turning over.
function groan(t) {
  const o = actx.createOscillator(); o.type = "sawtooth";
  const base = 70 + Math.random() * 40;
  o.frequency.setValueAtTime(base, t);
  o.frequency.linearRampToValueAtTime(base * 1.5, t + 1.0);
  o.frequency.linearRampToValueAtTime(base * 0.8, t + 2.4);
  const lp = actx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 300; lp.Q.value = 6;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(0.14, t + 0.8);
  g.gain.linearRampToValueAtTime(0.0001, t + 2.6);
  o.connect(lp); lp.connect(g); g.connect(music.master);
  o.start(t); o.stop(t + 2.7);
}
function scheduleGroan() {
  if (!music.started) return;
  if (!scoreSilent() && Math.random() < 0.7) groan(actx.currentTime + 0.05);
  setTimeout(scheduleGroan, (11 + Math.random() * 14) * 1000);
}

// Sub-bass rumble bed from filtered noise — felt more than heard.
function buildRumble() {
  const src = actx.createBufferSource(); src.buffer = music.noise; src.loop = true;
  const lp = actx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 90; lp.Q.value = 1;
  const g = actx.createGain(); g.gain.value = 0.5;
  const lfo = actx.createOscillator(); lfo.frequency.value = 0.07;
  const lfoG = actx.createGain(); lfoG.gain.value = 0.3;
  lfo.connect(lfoG); lfoG.connect(g.gain); lfo.start();
  src.connect(lp); lp.connect(g); g.connect(music.master); src.start();
}

// A single "lub-dub" heartbeat. Speeds up as the board fills / when you're losing.
function thump(t, f, vol) {
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = "sine";
  o.frequency.setValueAtTime(f * 1.7, t);
  o.frequency.exponentialRampToValueAtTime(f * 0.5, t + 0.16);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);
  o.connect(g); g.connect(music.master);
  o.start(t); o.stop(t + 0.36);
}
function scheduleHeartbeat() {
  if (!music.started) return;
  if (jump.state === "off") {                       // during the loss sequence: dead still
    const t = actx.currentTime + 0.04;
    thump(t, 58, 0.55);
    thump(t + 0.19, 48, 0.42);
    heartPulse = 1;                                 // tells the renderer to throb
  }
  let interval = music.tense ? 0.7 : 1.6;
  if (gameOver && winner === SPORE) interval = 2.4;          // slow exhale on a win
  setTimeout(scheduleHeartbeat, interval * 1000);
}

// A bowed, detuned violin-ish screech that swells and dies — sparse and sudden.
function screech(t, vol = 0.07) {
  if (!music.started || scoreSilent()) return;
  const o = actx.createOscillator(); o.type = "sawtooth";
  const base = 520 + Math.random() * 900;
  o.frequency.setValueAtTime(base, t);
  o.frequency.linearRampToValueAtTime(base * (1 + Math.random() * 0.04), t + 1.1);
  const vib = actx.createOscillator(); vib.frequency.value = 5 + Math.random() * 5;
  const vibG = actx.createGain(); vibG.gain.value = 10 + Math.random() * 10;
  vib.connect(vibG); vibG.connect(o.frequency);
  const bp = actx.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = base; bp.Q.value = 7;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.5);
  g.gain.linearRampToValueAtTime(0.0001, t + 1.5);
  o.connect(bp); bp.connect(g); g.connect(music.master);
  o.start(t); vib.start(t); o.stop(t + 1.6); vib.stop(t + 1.6);
}
function scheduleStinger() {
  if (!music.started) return;
  if (!scoreSilent() && Math.random() < 0.9) screech(actx.currentTime + 0.05, music.tense ? 0.1 : 0.07);
  const gap = music.tense ? (3 + Math.random() * 5) : (5 + Math.random() * 9); // closer when tense
  setTimeout(scheduleStinger, gap * 1000);
}

// Filtered-noise "whisper" that sweeps up and fades — like something breathing close by.
function whisper(t) {
  const src = actx.createBufferSource(); src.buffer = music.noise; src.loop = true;
  const bp = actx.createBiquadFilter(); bp.type = "bandpass"; bp.Q.value = 4;
  bp.frequency.setValueAtTime(700, t);
  bp.frequency.linearRampToValueAtTime(2600, t + 2.4);
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(0.05, t + 1.6);
  g.gain.linearRampToValueAtTime(0.0001, t + 3.6);
  src.connect(bp); bp.connect(g); g.connect(music.master);
  src.start(t); src.stop(t + 3.7);
}
function scheduleWhisper() {
  if (!music.started) return;
  if (!scoreSilent()) whisper(actx.currentTime + 0.05);
  setTimeout(scheduleWhisper, (9 + Math.random() * 12) * 1000);
}

// Begin the loss sequence: kill the score to silence, then arm the jumpscare.
function triggerLoss() {
  if (music.master && actx) {
    music.master.gain.cancelScheduledValues(actx.currentTime);
    music.master.gain.linearRampToValueAtTime(0.0001, actx.currentTime + 0.5); // everything goes quiet
  }
  jump.state = "quiet";
  jump.t = 0;
  jump.wait = 200 + Math.floor(Math.random() * 260);  // ~3.3–7.7s of dread before it hits
}

// The jumpscare itself: a sudden, brutal wall of sound (sub-boom + noise blast +
// dissonant screech cluster) routed straight to the output, bypassing the muted
// score bus. Paired with the on-screen lunge in drawJumpscare().
function jumpscareSound() {
  if (muted) return;
  ensureCtx();
  const t = actx.currentTime;
  const out = actx.createGain(); out.gain.value = 0.9; out.connect(actx.destination);

  // sub boom dropping through the floor
  const bo = actx.createOscillator(), bg = actx.createGain();
  bo.type = "sine"; bo.frequency.setValueAtTime(140, t); bo.frequency.exponentialRampToValueAtTime(26, t + 0.9);
  bg.gain.setValueAtTime(0.7, t); bg.gain.exponentialRampToValueAtTime(0.0001, t + 1.4);
  bo.connect(bg); bg.connect(out); bo.start(t); bo.stop(t + 1.5);

  // explosive noise burst
  const ns = actx.createBufferSource(); ns.buffer = music.noise || makeNoiseBuffer(); ns.loop = true;
  const nf = actx.createBiquadFilter(); nf.type = "highpass"; nf.frequency.value = 500;
  const ng = actx.createGain(); ng.gain.setValueAtTime(0.6, t); ng.gain.exponentialRampToValueAtTime(0.0001, t + 1.0);
  ns.connect(nf); nf.connect(ng); ng.connect(out); ns.start(t); ns.stop(t + 1.1);

  // shrieking detuned cluster
  [311, 349, 466, 587, 740, 988].forEach((f) => {
    const o = actx.createOscillator(); o.type = "sawtooth";
    o.frequency.setValueAtTime(f * 2, t);
    o.frequency.linearRampToValueAtTime(f * 2 * 1.03, t + 1.1);
    o.detune.value = (Math.random() - 0.5) * 30;
    const g = actx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.14, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.3);
    o.connect(g); g.connect(out); o.start(t); o.stop(t + 1.35);
  });
}

// Resume/raise or duck the score when mute toggles.
function applyMute() {
  if (music.master && actx) {
    // stay silent while the loss sequence is running, even if un-muted
    const target = (muted || jump.state !== "off") ? 0.0001 : music.vol;
    music.master.gain.cancelScheduledValues(actx.currentTime);
    music.master.gain.linearRampToValueAtTime(target, actx.currentTime + 0.4);
  }
}

// Audio can only start after a user gesture — kick the score off on first input.
function unlockAudio() {
  ensureCtx();
  startMusic();
}
window.addEventListener("mousedown", unlockAudio, { once: true });
window.addEventListener("touchstart", unlockAudio, { once: true });
window.addEventListener("keydown", unlockAudio, { once: true });

// --- Helpers ---------------------------------------------------------------
function emptyHoles() { return holes.filter(h => h.owner === 0); }

// Does `owner` have NEED-in-a-row through any hole? Returns the line or null.
function findWin(owner) {
  for (const h of holes) {
    if (h.owner !== owner) continue;
    for (const [dq, dr] of DIRS) {
      const line = [h];
      let q = h.q + dq, r = h.r + dr;
      while (holeAt[key(q, r)] && holeAt[key(q, r)].owner === owner) {
        line.push(holeAt[key(q, r)]);
        q += dq; r += dr;
      }
      if (line.length >= NEED) return line.slice(0, NEED);
    }
  }
  return null;
}

// --- Placing a hole --------------------------------------------------------
function place(hole, owner) {
  hole.owner = owner;
  hole.pop = 1;                                      // triggers the squish-in animation
  spawnBurst(hole.x, hole.y, COLORS[owner].core, 14);
  shake = Math.min(shake + 5, 14);
  plopSound();

  const line = findWin(owner);
  if (line) { endGame(owner, line); return; }

  movesSincePlace++;
  if (infested) maybeFester();

  if (emptyHoles().length === 0) { endGame(-1, []); return; }

  turn = owner === SPORE ? MITE : SPORE;
  if (vsCpu && turn === MITE) cpuThinkAt = frame + 32; // brief "thinking" beat
}

// In Infested mode, every couple of moves a random empty hole fests shut.
// We avoid festering a hole that would instantly complete EITHER player's line
// (keeps it tense, not arbitrary) and cap the spread so the board stays winnable.
function maybeFester() {
  const festeredCount = holes.filter(h => h.owner === FESTER).length;
  if (festeredCount >= 8) return;
  if (movesSincePlace % 3 !== 0) return;
  const empties = emptyHoles();
  if (empties.length <= NEED + 2) return;            // don't choke a nearly-full board
  const pick = empties[Math.floor(Math.random() * empties.length)];
  pick.owner = FESTER;
  pick.pop = 1;
  spawnBurst(pick.x, pick.y, "#5a3a2a", 10);
  festerSound();
  banner = { text: "IT SPREADS", color: "#a06a4a", t: 70 };
}

function endGame(who, line) {
  gameOver = true;
  winner = who;
  winLine = line;
  shake = 20;
  if (who === SPORE) { banner = { text: "SPORES WIN", color: COLORS[SPORE].core, t: 240 }; winSound(); }
  else if (who === MITE) {
    // The dreaded outcome: cut to silence and arm the jumpscare (see triggerLoss).
    banner = { text: vsCpu ? "INFESTED" : "MITES WIN", color: COLORS[MITE].core, t: 120 };
    triggerLoss();
  } else { banner = { text: "CLOGGED — DRAW", color: "#9a8a6a", t: 240 }; }
  for (const h of line) spawnBurst(h.x, h.y, COLORS[who].core, 26);
}

// --- CPU -------------------------------------------------------------------
// The AI takes any win, blocks any immediate loss, and otherwise searches ahead
// with alpha-beta minimax over a windowed board score. Looking 4+ plies deep is
// what lets it smother a developing open-ended three BEFORE it forks into an
// unstoppable double threat — the old "just draw a straight line" exploit.
function cpuMove() {
  const empties = emptyHoles();
  if (!empties.length) return;
  let choice;
  if (difficulty === 1) {
    // Easy: grabs an obvious win or block, but otherwise plays loose.
    choice = winningMove(MITE) || winningMove(SPORE) ||
             (Math.random() < 0.5 ? randomCandidate() : searchMove(2));
  } else {
    // Medium searches 4 plies, Hard 5 — both deep enough to defuse a fork.
    choice = winningMove(MITE) || winningMove(SPORE) || searchMove(difficulty === 2 ? 4 : 5);
  }
  place(choice || empties[0], MITE);
}

// A move that immediately completes NEED-in-a-row for `owner`, or null.
function winningMove(owner) {
  for (const h of emptyHoles()) {
    h.owner = owner;
    const win = findWin(owner);
    h.owner = 0;
    if (win) return h;
  }
  return null;
}

function randomCandidate() {
  const c = candidateMoves();
  return c[Math.floor(Math.random() * c.length)];
}

// Empty holes worth considering: those touching an occupied hole (or the centre
// on an empty board), ranked by a cheap centrality/adjacency score and capped.
// Restricting and ordering moves keeps the alpha-beta search fast and focused.
function candidateMoves() {
  const set = new Set();
  for (const h of holes) {
    if (h.owner === 0) continue;
    for (const [dq, dr] of NEIGHBORS) {
      const n = holeAt[key(h.q + dq, h.r + dr)];
      if (n && n.owner === 0) set.add(n);
    }
  }
  const cands = [...set];
  if (!cands.length) return [holeAt[key(0, 0)]];
  for (const c of cands) c._ord = quickScore(c);
  cands.sort((a, b) => b._ord - a._ord);
  return cands.slice(0, 18);
}

function quickScore(c) {
  let s = R - Math.max(Math.abs(c.q), Math.abs(c.r), Math.abs(c.q + c.r)); // central = better
  for (const [dq, dr] of NEIGHBORS) {
    const n = holeAt[key(c.q + dq, c.r + dr)];
    if (n && n.owner !== 0) s += 2;                  // next to existing play = better
  }
  return s;
}

// Board score from MITE's point of view: sum every still-winnable window,
// rewarding MITE's near-complete lines and (slightly more) punishing SPORE's.
function evaluate() {
  let score = 0;
  for (const w of WINDOWS) {
    let me = 0, op = 0;
    for (const c of w) {
      if (c.owner === MITE) me++;
      else if (c.owner === SPORE) op++;
      else if (c.owner === FESTER) { me = op = 9; break; } // festered = dead window
    }
    if (me && op) continue;                          // contested window — worthless
    if (me === NEED) return 100000;
    if (op === NEED) return -100000;
    score += WEIGHT[me] - WEIGHT[op] * 1.08;         // slight defensive bias
  }
  return score;
}

function minimax(depth, alpha, beta, maximizing) {
  const term = evaluate();
  if (depth === 0 || term >= 100000 || term <= -100000) return term;
  const moves = candidateMoves();
  if (!moves.length) return term;
  if (maximizing) {
    let best = -Infinity;
    for (const m of moves) {
      m.owner = MITE;
      const v = minimax(depth - 1, alpha, beta, false);
      m.owner = 0;
      if (v > best) best = v;
      if (best > alpha) alpha = best;
      if (alpha >= beta) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (const m of moves) {
      m.owner = SPORE;
      const v = minimax(depth - 1, alpha, beta, true);
      m.owner = 0;
      if (v < best) best = v;
      if (best < beta) beta = best;
      if (alpha >= beta) break;
    }
    return best;
  }
}

function searchMove(depth) {
  const moves = candidateMoves();
  let best = moves[0], bestV = -Infinity;
  for (const m of moves) {
    m.owner = MITE;
    let v = minimax(depth - 1, -Infinity, Infinity, false);
    m.owner = 0;
    v += Math.random() * 0.25;                       // tiny jitter to vary equal moves
    if (v > bestV) { bestV = v; best = m; }
  }
  return best;
}

// --- Input -----------------------------------------------------------------
function holeFromPointer(px, py) {
  let nearest = null, nd = HOLE_R * HOLE_R;
  for (const h of holes) {
    const d = (h.x - px) ** 2 + (h.y - py) ** 2;
    if (d < nd) { nd = d; nearest = h; }
  }
  return nearest;
}

function pointerPos(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  return { x: cx * (W / rect.width), y: cy * (H / rect.height) };
}

function tryPlace(e) {
  if (gameOver) { reset(); return; }
  if (vsCpu && turn === MITE) return;                // not your turn
  const { x, y } = pointerPos(e);
  const h = holeFromPointer(x, y);
  if (h && h.owner === 0) place(h, turn);
}

canvas.addEventListener("mousedown", tryPlace);
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); tryPlace(e); }, { passive: false });

canvas.addEventListener("mousemove", (e) => {
  const { x, y } = pointerPos(e);
  const near = holeFromPointer(x, y);
  for (const h of holes) h.hoverTarget = (h === near && h.owner === 0 && !(vsCpu && turn === MITE) && !gameOver) ? 1 : 0;
});

window.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (k === " " || k === "r") { e.preventDefault(); reset(); }
  else if (k === "1") { difficulty = 1; vsCpu = true; flash("EASY CPU"); }
  else if (k === "2") { difficulty = 2; vsCpu = true; flash("MEDIUM CPU"); }
  else if (k === "3") { difficulty = 3; vsCpu = true; flash("HARD CPU"); }
  else if (k === "p") { vsCpu = !vsCpu; flash(vsCpu ? "VS CPU" : "2-PLAYER"); }
  else if (k === "i") { infested = !infested; flash(infested ? "INFESTED ON" : "INFESTED OFF"); }
  else if (k === "m") { muted = !muted; applyMute(); flash(muted ? "MUTED" : "SOUND ON"); }
});

function flash(text) { banner = { text, color: "#b59a7a", t: 80 }; }

function reset() {
  for (const h of holes) { h.owner = 0; h.pop = 0; h.hover = 0; h.hoverTarget = 0; }
  turn = SPORE; gameOver = false; winner = 0; winLine = [];
  particles = []; shake = 0; movesSincePlace = 0; banner = null;
  cpuThinkAt = 0;
  jump.state = "off"; jump.t = 0;                    // disarm any pending jumpscare
  if (music.started && actx) {                       // bring the score back from silence
    music.master.gain.cancelScheduledValues(actx.currentTime);
    music.master.gain.linearRampToValueAtTime(muted ? 0.0001 : music.vol, actx.currentTime + 1.5);
  }
}

// --- Particles & ambient bugs ----------------------------------------------
function spawnBurst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 1 + Math.random() * 3.5;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, color, size: 1 + Math.random() * 2.5 });
  }
}
for (let i = 0; i < 5; i++) {
  crawlers.push({ x: Math.random() * W, y: Math.random() * H, a: Math.random() * Math.PI * 2, sp: 0.2 + Math.random() * 0.3, t: 0 });
}

// --- Rendering -------------------------------------------------------------
function drawHole(h) {
  const r = HOLE_R;
  if (h.owner === 0) {
    // an empty pit: dark radial well that reads as a hole
    const g = ctx.createRadialGradient(h.x - 3, h.y - 3, 2, h.x, h.y, r);
    g.addColorStop(0, "#000");
    g.addColorStop(0.6, "#16100c");
    g.addColorStop(1, "#3a2c22");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(h.x, h.y, r, 0, Math.PI * 2); ctx.fill();
    // hover glow ring for the current player
    if (h.hover > 0.01) {
      ctx.strokeStyle = COLORS[turn] ? COLORS[turn].glow : "rgba(255,255,255,0.4)";
      ctx.lineWidth = 2 + h.hover * 2;
      ctx.globalAlpha = h.hover;
      ctx.beginPath(); ctx.arc(h.x, h.y, r - 2, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1;
    }
    return;
  }

  // pop animation: holes squish up to full size when plugged
  const scale = 0.5 + 0.5 * (1 - h.pop);
  const rr = r * (h.owner === FESTER ? 0.95 : scale);

  if (h.owner === FESTER) {
    // a festered hole: oozing dark scab with a crawling speckle
    const g = ctx.createRadialGradient(h.x, h.y, 2, h.x, h.y, r);
    g.addColorStop(0, "#3a241a");
    g.addColorStop(1, "#180f0a");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(h.x, h.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "rgba(90,60,40,0.7)";
    for (let i = 0; i < 5; i++) {
      const a = i * 1.7 + h.x;
      ctx.beginPath();
      ctx.arc(h.x + Math.cos(a) * r * 0.4, h.y + Math.sin(a) * r * 0.4, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }
    return;
  }

  const c = COLORS[h.owner];
  // outer rim
  ctx.fillStyle = c.rim;
  ctx.beginPath(); ctx.arc(h.x, h.y, rr, 0, Math.PI * 2); ctx.fill();
  // glossy bulb body
  const pulse = 1 + Math.sin(frame * 0.06 + h.x) * 0.04;
  const g = ctx.createRadialGradient(h.x - rr * 0.3, h.y - rr * 0.3, 1, h.x, h.y, rr);
  g.addColorStop(0, "#ffffff");
  g.addColorStop(0.25, c.core);
  g.addColorStop(1, c.rim);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(h.x, h.y, rr * 0.78 * pulse, 0, Math.PI * 2); ctx.fill();
  // a tiny dark "pupil" so the cluster feels like it's looking back
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.beginPath(); ctx.arc(h.x, h.y, rr * 0.18, 0, Math.PI * 2); ctx.fill();
}

function draw() {
  frame++;
  ctx.save();
  if (shake > 0.2) {
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    shake *= 0.88;
  } else shake = 0;

  // fleshy background wash
  const bg = ctx.createRadialGradient(W / 2, ORIGIN_Y, 60, W / 2, ORIGIN_Y, W * 0.75);
  bg.addColorStop(0, "#1a1310");
  bg.addColorStop(1, "#07060a");
  ctx.fillStyle = bg;
  ctx.fillRect(-30, -30, W + 60, H + 60);

  // ambient crawlers skittering under the holes
  for (const c of crawlers) {
    c.t++;
    if (c.t % 60 === 0) c.a += (Math.random() - 0.5) * 1.5;
    c.x += Math.cos(c.a) * c.sp; c.y += Math.sin(c.a) * c.sp;
    if (c.x < 0) c.x = W; if (c.x > W) c.x = 0;
    if (c.y < 0) c.y = H; if (c.y > H) c.y = 0;
    ctx.fillStyle = "rgba(60,45,35,0.5)";
    ctx.beginPath(); ctx.arc(c.x, c.y, 1.8, 0, Math.PI * 2); ctx.fill();
  }

  // animate hole transitions
  for (const h of holes) {
    if (h.pop > 0) h.pop = Math.max(0, h.pop - 0.06);
    const target = h.hoverTarget || 0;
    h.hover += (target - h.hover) * 0.2;
  }

  // draw all holes
  for (const h of holes) drawHole(h);

  // winning-line flourish: pulsing ring around the four holes
  if (gameOver && winLine.length) {
    const a = 0.4 + Math.sin(frame * 0.12) * 0.3;
    ctx.strokeStyle = `rgba(255,255,255,${a})`;
    ctx.lineWidth = 4;
    for (const h of winLine) {
      ctx.beginPath(); ctx.arc(h.x, h.y, HOLE_R + 4, 0, Math.PI * 2); ctx.stroke();
    }
  }

  // particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.vx *= 0.97; p.life -= 0.025;
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  particles = particles.filter(p => p.life > 0);

  ctx.restore();

  drawVignette();
  drawHud();

  // --- loss sequence: silence → creeping dark → sudden lunge ----------------
  if (jump.state === "quiet") {
    jump.t++;
    drawQuiet(Math.min(1, jump.t / jump.wait));
    if (jump.t >= jump.wait) {                 // the wait is over...
      jump.state = "active"; jump.t = 0; shake = 46;
      jumpscareSound();
      if (navigator.vibrate) navigator.vibrate([220, 60, 320]);
    }
  } else if (jump.state === "active") {
    drawJumpscare(++jump.t);
  }

  // the heartbeat quickens as the cluster fills in (and on a loss — see scheduler)
  music.tense = !gameOver && emptyHoles().length < holes.length * 0.45;

  // CPU acts after its little think delay
  if (vsCpu && turn === MITE && !gameOver && frame >= cpuThinkAt && cpuThinkAt > 0) {
    cpuThinkAt = 0;
    cpuMove();
  }

  if (banner) { banner.t--; if (banner.t <= 0) banner = null; }

  requestAnimationFrame(draw);
}

// Red vignette that pulses on every heartbeat — the dread made visible.
function drawVignette() {
  heartPulse *= 0.9;
  const a = 0.18 + heartPulse * 0.3 + (music.tense ? 0.08 : 0);
  const g = ctx.createRadialGradient(W / 2, ORIGIN_Y, W * 0.22, W / 2, ORIGIN_Y, W * 0.72);
  g.addColorStop(0, "rgba(0,0,0,0)");
  g.addColorStop(0.7, `rgba(40,0,0,${a * 0.5})`);
  g.addColorStop(1, `rgba(80,0,5,${a})`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// The quiet: the whole screen slowly drowns in black while two faint red eyes
// you can't quite trust begin to surface. Then nothing — for an uneasy while.
function drawQuiet(p) {
  ctx.fillStyle = `rgba(0,0,0,${Math.pow(p, 1.5) * 0.94})`;
  ctx.fillRect(0, 0, W, H);
  if (p > 0.5) {
    const a = (p - 0.5) * 2 * 0.13 * (0.55 + 0.45 * Math.sin(frame * 0.07));
    ctx.fillStyle = `rgba(150,0,0,${a})`;
    for (const dx of [-42, 42]) {
      ctx.beginPath(); ctx.arc(W / 2 + dx, ORIGIN_Y, 6.5, 0, Math.PI * 2); ctx.fill();
    }
  }
}

// The lunge: a screaming, hole-riddled face snaps to full screen and shudders.
function drawJumpscare(t) {
  ctx.fillStyle = "#000"; ctx.fillRect(0, 0, W, H);
  const inten = Math.max(0, 1 - (t - 4) / 80);      // violence of the lunge, decays
  ctx.save();
  const jit = inten * 22;
  ctx.translate((Math.random() - 0.5) * jit, (Math.random() - 0.5) * jit);
  const cx = W / 2, cy = H * 0.46;
  const sc = 1.02 + Math.max(0, 0.14 - t * 0.004) + Math.sin(t * 0.4) * 0.01 * inten;
  ctx.translate(cx, cy); ctx.scale(sc, sc); ctx.translate(-cx, -cy);
  drawFace(cx, cy, inten);
  ctx.restore();
  if (inten > 0) { ctx.fillStyle = `rgba(130,0,0,${inten * 0.38})`; ctx.fillRect(0, 0, W, H); }
  if (t < 5) { ctx.fillStyle = `rgba(255,255,255,${(5 - t) / 5 * 0.92})`; ctx.fillRect(0, 0, W, H); } // impact flash
  if (t > 90) {                                     // once it settles, offer the way out
    ctx.textAlign = "center";
    ctx.fillStyle = `rgba(180,160,150,${0.3 + 0.2 * Math.sin(t * 0.06)})`;
    ctx.font = "13px 'Courier New', monospace";
    ctx.fillText("click to escape", W / 2, H - 24);
  }
}

// A gaunt face pocked with clustered holes (of course), hollow eyes, screaming mouth.
function drawFace(cx, cy, inten) {
  const fw = W * 0.46, fh = H * 0.5;
  let g = ctx.createRadialGradient(cx, cy - 30, 20, cx, cy, fh);
  g.addColorStop(0, "#bdb49d"); g.addColorStop(0.7, "#857f68"); g.addColorStop(1, "#100d08");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.ellipse(cx, cy, fw, fh, 0, 0, Math.PI * 2); ctx.fill();

  // clustered holes across the skin — fixed positions (golden-angle spiral) so they don't flicker
  ctx.fillStyle = "rgba(8,5,3,0.85)";
  for (let i = 0; i < 95; i++) {
    const a = i * 2.39996, rad = Math.sqrt(i / 95) * fw * 0.95;
    const x = cx + Math.cos(a) * rad, y = cy + Math.sin(a) * rad * 1.05;
    ctx.beginPath(); ctx.arc(x, y, 3 + (i % 5 === 0 ? 2 : 0), 0, Math.PI * 2); ctx.fill();
  }

  // hollow eye sockets with a glowing, twitching red pupil
  for (const dx of [-fw * 0.4, fw * 0.4]) {
    const ex = cx + dx, ey = cy - fh * 0.18;
    let eg = ctx.createRadialGradient(ex, ey, 2, ex, ey, fw * 0.3);
    eg.addColorStop(0, "#000"); eg.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = eg;
    ctx.beginPath(); ctx.ellipse(ex, ey, fw * 0.27, fh * 0.2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(255,30,18,${0.7 + 0.3 * inten})`;
    const pj = inten * (Math.random() - 0.5) * 6;
    ctx.beginPath(); ctx.arc(ex + pj, ey, 7 + inten * 3, 0, Math.PI * 2); ctx.fill();
  }

  // gaping, screaming mouth ringed with jagged teeth
  const my = cy + fh * 0.42;
  let mg = ctx.createRadialGradient(cx, my, 4, cx, my, fw * 0.4);
  mg.addColorStop(0, "#2a0000"); mg.addColorStop(0.6, "#070000"); mg.addColorStop(1, "#000");
  ctx.fillStyle = mg;
  ctx.beginPath(); ctx.ellipse(cx, my, fw * 0.26, fh * 0.24, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#9a9482";
  const tw = (fw * 0.5) / 8;
  for (let i = 0; i < 8; i++) {
    const tx = cx - fw * 0.24 + i * tw + tw / 2;
    ctx.beginPath();
    ctx.moveTo(tx - tw * 0.4, my - fh * 0.22); ctx.lineTo(tx + tw * 0.4, my - fh * 0.22);
    ctx.lineTo(tx, my - fh * 0.12); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(tx - tw * 0.4, my + fh * 0.22); ctx.lineTo(tx + tw * 0.4, my + fh * 0.22);
    ctx.lineTo(tx, my + fh * 0.12); ctx.closePath(); ctx.fill();
  }
}

function drawHud() {
  // Title
  ctx.textAlign = "center";
  ctx.fillStyle = "#7a3a3a";
  ctx.font = "bold 30px 'Courier New', monospace";
  ctx.fillText("TRYPOPHOBIA", W / 2, 38);
  ctx.fillStyle = "#5a4636";
  ctx.font = "11px 'Courier New', monospace";
  ctx.fillText("fear of clustered holes", W / 2, 54);

  // Turn / status pills
  ctx.font = "bold 15px 'Courier New', monospace";
  const label = gameOver
    ? "click / Space to play again"
    : (vsCpu && turn === MITE ? "MITE (CPU) is plugging…" : `${COLORS[turn].name}'s turn — plug a hole`);
  // current player's color dot
  if (!gameOver) {
    ctx.fillStyle = COLORS[turn].core;
    ctx.beginPath(); ctx.arc(W / 2 - ctx.measureText(label).width / 2 - 14, H - 22, 6, 0, Math.PI * 2); ctx.fill();
  }
  ctx.fillStyle = gameOver ? "#9a8a6a" : COLORS[turn] ? COLORS[turn].core : "#fff";
  ctx.fillText(label, W / 2 + (gameOver ? 0 : 8), H - 17);

  // mode chips (top corners)
  ctx.font = "11px 'Courier New', monospace";
  ctx.textAlign = "left";
  ctx.fillStyle = "#6e5a44";
  ctx.fillText(vsCpu ? ["", "EASY", "MEDIUM", "HARD"][difficulty] + " CPU" : "2-PLAYER", 12, 20);
  ctx.textAlign = "right";
  if (infested) { ctx.fillStyle = "#a06a4a"; ctx.fillText("⚠ INFESTED", W - 12, 20); }
  if (muted) { ctx.fillStyle = "#6e5a44"; ctx.fillText("muted", W - 12, 36); }

  // banner
  if (banner) {
    ctx.textAlign = "center";
    ctx.globalAlpha = Math.min(1, banner.t / 30);
    ctx.fillStyle = banner.color;
    ctx.font = "bold 34px 'Courier New', monospace";
    ctx.fillText(banner.text, W / 2, ORIGIN_Y - 6);
    ctx.globalAlpha = 1;
  }
}

reset();
draw();
</script>
</body>
</html>
